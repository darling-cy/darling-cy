name: generate-snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # 这里的参数实现了：白色背景感的方块 + 浅蓝色系蛇 + 自动彩虹变色
            dist/snake-rainbow.svg?color_snake=#B0E0E6&color_dots=#f0f0f0,#e0f0ff,#c0e0ff,#a0d0ff,#80c0ff
            # 如果你想要更纯净的白色背景，可以用下面这个（方块颜色极浅）
            # dist/snake-white.svg?color_snake=#FFB6C1&color_dots=#ffffff,#f8f8f8,#f0f0f0,#e8e8e8,#e0e0e0

      - name: deploy snake
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
